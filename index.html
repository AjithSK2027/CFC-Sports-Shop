<!DOCTYPE html>
<html>
<head>
    <title>Sports Hub Sales</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background: #1a73e8; color: white; font-weight: bold; border: none; cursor: pointer; }
        .total { font-size: 1.2em; font-weight: bold; color: #d93025; }
    </style>
</head>
<body>

<div class="card">
    <h2>Sports Hub Sale</h2>
    
    <label>Product Code</label>
    <input type="text" id="pCode" list="productList" placeholder="Enter or Scan Code" onchange="updateDetails()">
    <datalist id="productList"></datalist>

    <p id="pName">Product: --</p>
    
    <label>Quantity</label>
    <input type="number" id="qty" value="1" oninput="calculate()">

    <label>Price</label>
    <input type="number" id="price" oninput="calculate()">

    <label>Payment Mode</label>
    <select id="mode">
        <option>UPI</option>
        <option>Cash</option>
        <option>Card</option>
    </select>

    <label>Customer Name</label>
    <input type="text" id="customer" placeholder="Optional">

    <div class="total">Total: ₹<span id="totalDisplay">0</span></div>
    
    <button onclick="submitSale()" id="subBtn">Submit Sale</button>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz5NTLwcEh5FclZMOokc7bY0_Ypw9rPdIB_0T9Dw0MPVSMGiezzBF0hN1U38tIwVTqpkg/exec';
    let inventory = [];

    // Load products on start
    fetch(scriptURL).then(res => res.json()).then(data => {
        inventory = data;
        const list = document.getElementById('productList');
        data.forEach(p => {
            let opt = document.createElement('option');
            opt.value = p.code;
            opt.innerHTML = p.name;
            list.appendChild(opt);
        });
    });

    function updateDetails() {
        const code = document.getElementById('pCode').value;
        const item = inventory.find(i => i.code === code);
        if(item) {
            document.getElementById('pName').innerText = "Product: " + item.name + " (" + item.color + ")";
            document.getElementById('price').value = item.price;
            calculate();
        }
    }

    function calculate() {
        const q = document.getElementById('qty').value;
        const p = document.getElementById('price').value;
        document.getElementById('totalDisplay').innerText = q * p;
    }

    async function submitSale() {
        const btn = document.getElementById('subBtn');
        btn.innerText = "Processing...";
        btn.disabled = true;

        const code = document.getElementById('pCode').value;
        const item = inventory.find(i => i.code === code);

        const payload = {
            code: code,
            name: item ? item.name : "Unknown",
            color: item ? item.color : "-",
            qty: document.getElementById('qty').value,
            price: document.getElementById('price').value,
            mode: document.getElementById('mode').value,
            customer: document.getElementById('customer').value
        };

        await fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify(payload)
        });

        alert("Sale Logged to Sports Hub!");
        location.reload();
    }
</script>

</body>
</html>
