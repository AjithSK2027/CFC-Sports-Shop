<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CFC | Sports Hub POS</title>
    
    <link rel="apple-touch-icon" href="https://i.ibb.co/3nTMhbz/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png">
    <link rel="icon" type="image/png" href="https://i.ibb.co/3nTMhbz/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { pitch: '#050505', espresso: '#0F0A08', bean: '#1A1412', mint: '#10B981', rose: '#F43F5E', accent: '#38bdf8' }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-body: #F9FAFB;
            --bg-header: rgba(249, 250, 251, 0.85);
            --bg-card: #FFFFFF;
            --text-main: #111827;
            --text-gray: #6B7280;
            --border: rgba(0, 0, 0, 0.08);
            --card-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #050505;
                --bg-header: rgba(5, 5, 5, 0.6);
                --bg-card: linear-gradient(165deg, #1A1412 0%, #0F0A08 100%);
                --text-main: #E5E7EB;
                --text-gray: #9CA3AF;
                --border: rgba(255, 255, 255, 0.05);
                --card-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
            }
        }

        body { background-color: var(--bg-body); color: var(--text-main); -webkit-font-smoothing: antialiased; transition: all 0.3s ease; }
        
        /* HEADER FIX FOR NOTCH */
        header { 
            background-color: var(--bg-header); 
            padding-top: calc(env(safe-area-inset-top) + 1.2rem) !important;
            padding-bottom: 1rem;
        }

        .card-gradient { background: var(--bg-card); border: 1px solid var(--border); box-shadow: var(--card-shadow); backdrop-filter: blur(10px); }
        .input-box { background-color: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); border-radius: 18px; width: 100%; padding: 16px; font-size: 14px; font-weight: 600; outline: none; box-sizing: border-box; }
        
        .section-label { font-size: 10px; font-weight: 800; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1.5px; margin: 20px 0 10px 5px; display: block; }
        
        .product-preview-frame { width: 100%; height: 200px; background: rgba(0,0,0,0.03); border-radius: 24px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-preview-frame img { max-width: 80%; max-height: 80%; object-fit: contain; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.2)); opacity: 0; transition: 0.5s; }
        .product-preview-frame img.loaded { opacity: 1; }

        .receipt-discount-tag { color: var(--mint); font-weight: 800; font-size: 10px; background: rgba(16, 185, 129, 0.1); padding: 2px 8px; border-radius: 6px; }
        .qty-btn { width: 32px; height: 32px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-body); color: var(--text-main); display: flex; align-items: center; justify-content: center; font-weight: 800; }

        #paymentModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(15px); padding: 20px; }
        .suggestions-list { position: absolute; top: 65px; left: 0; right: 0; background: var(--bg-card); border: 1px solid var(--accent); border-radius: 18px; z-index: 1000; max-height: 250px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        #loadingBar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0; transition: width 0.4s ease; z-index: 9999; }
    </style>
</head>
<body class="pb-20">

<div id="loadingBar"></div>

<header class="px-6 flex justify-between items-center sticky top-0 backdrop-blur-md z-40">
    <div onclick="location.reload()" class="cursor-pointer">
        <h1 class="text-xl font-900 text-current uppercase leading-none">SPORTS <span class="text-accent">HUB</span></h1>
        <p class="text-gray-500 text-[10px] font-bold tracking-widest uppercase mt-1">Inventory POS</p>
    </div>
    <img src="https://i.ibb.co/3nTMhbz/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png" class="h-10 w-10">
</header>

<div class="px-6 max-w-md mx-auto mt-6">
    <div class="relative mb-6">
        <input type="text" id="idSearch" class="input-box border-accent/30" placeholder="Search Code or Name..." oninput="handleSearch()">
        <div id="suggestions" class="suggestions-list hidden"></div>
    </div>
    
    <span class="section-label">Browse Inventory</span>
    <div class="space-y-3">
        <select id="catSelect" class="input-box" onchange="filterBrands()"><option value="">Select Category</option></select>
        <div id="brandGroup" class="hidden"><select id="brandSelect" class="input-box" onchange="filterModels()"></select></div>
        <div id="modelGroup" class="hidden"><select id="modelSelect" class="input-box" onchange="filterSizes()"></select></div>
        <div class="grid grid-cols-2 gap-3">
            <div id="sizeGroup" class="hidden"><select id="sizeSelect" class="input-box" onchange="filterColors()"></select></div>
            <div id="colorGroup" class="hidden"><select id="colorSelect" class="input-box" onchange="loadProduct()"></select></div>
        </div>
    </div>

    <div id="dashPanel" class="hidden card-gradient rounded-[2rem] p-6 mt-6 space-y-4 transition-all">
        <div class="product-preview-frame">
            <img id="prodImage" src="" alt="Product">
        </div>
        <div class="flex justify-between items-center">
            <span id="resStockTag" class="text-[10px] font-black text-mint uppercase tracking-widest"></span>
            <span id="resDealer" class="text-xs font-bold text-accent"></span>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="text-[9px] font-black uppercase text-gray-500 ml-2">Sale Price</label>
                <input type="number" id="salePrice" class="input-box mt-1">
            </div>
            <div>
                <label class="text-[9px] font-black uppercase text-gray-500 ml-2">Qty</label>
                <input type="number" id="qty" class="input-box mt-1" value="1">
            </div>
        </div>
        <button onclick="addToCart()" class="w-full py-4 bg-accent text-white font-900 rounded-2xl shadow-lg shadow-accent/20 active:scale-95 transition-all uppercase text-xs tracking-widest">Add to Basket</button>
    </div>

    <div id="receiptSection" class="hidden mt-8">
        <span class="section-label">Basket Summary</span>
        <div class="card-gradient rounded-[2rem] p-6 space-y-4" id="receiptContent"></div>
        
        <span class="section-label">Target Rounding</span>
        <div class="grid grid-cols-2 gap-3">
            <input type="number" id="targetTotal" class="input-box border-mint/40" placeholder="Target Bill Total" oninput="applyTargetRounding()">
            <div class="bg-mint/10 rounded-[18px] flex items-center justify-center text-[10px] font-black text-mint uppercase tracking-widest">Auto-Adjust</div>
        </div>
    </div>

    <span class="section-label">Transaction Details</span>
    <div class="grid grid-cols-3 gap-3 mb-3">
        <select id="payMode" class="input-box col-span-1"><option value="UPI">UPI</option><option value="Cash">Cash</option></select>
        <input type="text" id="custName" class="input-box col-span-2" placeholder="Customer Name">
    </div>
    <input type="text" id="receivedBy" class="input-box" placeholder="Handled By Staff">

    <button onclick="handleCheckoutFlow()" id="finishBtn" class="w-full py-5 bg-pitch dark:bg-white text-white dark:text-pitch font-900 rounded-2xl mt-8 mb-10 active:scale-95 transition-all shadow-2xl uppercase tracking-widest text-sm">Confirm & Checkout</button>
</div>

<div id="paymentModal">
    <div class="card-gradient p-8 rounded-[2.5rem] text-center max-w-xs w-full space-y-6">
        <span class="text-[10px] font-black text-accent uppercase tracking-widest">Total to Collect</span>
        <h2 id="modalTotal" class="text-4xl font-900">₹0</h2>
        <div class="bg-white p-4 rounded-3xl shadow-inner"><img src="https://i.ibb.co/zV8dWkRg/Whats-App-Image-2026-04-09-at-2-44-08-PM.jpg" class="w-full"></div>
        <button onclick="submitSale()" class="w-full py-4 bg-mint text-white font-900 rounded-2xl uppercase text-xs">Payment Received</button>
        <button onclick="closeModal()" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Cancel</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz22v-vi--FVqqqU4iQaSXngUZdXIQ9EII5vA68WJWzhMMsrmw4zG6uTaWYqd8riyzF9Q/exec';
    let rawData = [], cart = [], selectedItem = null, grandTotal = 0;

    window.onload = () => {
        const bar = document.getElementById('loadingBar'); bar.style.width = '30%';
        const cached = localStorage.getItem('sportsHubCache');
        if (cached) { rawData = JSON.parse(cached); populateCategories(); bar.style.width = '60%'; }
        fetch(scriptURL).then(r => r.json()).then(data => {
            rawData = data; localStorage.setItem('sportsHubCache', JSON.stringify(data));
            populateCategories(); bar.style.width = '100%'; setTimeout(() => bar.style.width = '0', 500);
        });
    };

    function populateCategories() {
        const cats = [...new Set(rawData.map(i => i.name))];
        const sel = document.getElementById('catSelect'); sel.innerHTML = '<option value="">Select Category</option>';
        cats.forEach(c => {
            const stock = rawData.filter(i => i.name === c).reduce((a, b) => a + b.stock, 0);
            sel.add(new Option(`${c} (${stock})`, c));
        });
    }

    function handleSearch() {
        const query = document.getElementById('idSearch').value.toUpperCase();
        const suggs = document.getElementById('suggestions');
        if (query.length < 2) { suggs.classList.add('hidden'); return; }
        const matches = rawData.filter(i => i.code.toUpperCase().includes(query) || i.name.toUpperCase().includes(query)).slice(0, 5);
        if (matches.length > 0) {
            suggs.innerHTML = '';
            matches.forEach(i => {
                const d = document.createElement('div');
                d.className = 'p-4 border-b border-black/5 dark:border-white/5 cursor-pointer text-xs font-bold';
                d.innerHTML = `${i.code} - ${i.name} <span class="text-accent text-[9px] block uppercase opacity-60">${i.brand} • ${i.size}</span>`;
                d.onclick = () => { selectProduct(i); suggs.classList.add('hidden'); document.getElementById('idSearch').value = i.code; };
                suggs.appendChild(d);
            });
            suggs.classList.remove('hidden');
        } else { suggs.classList.add('hidden'); }
    }

    function selectProduct(item) {
        document.getElementById('catSelect').value = item.name;
        filterBrands(item.brand, item.model, item.size, item.color);
    }

    function filterBrands(pB, pM, pS, pC) {
        const c = document.getElementById('catSelect').value, bs = document.getElementById('brandSelect');
        bs.innerHTML = '<option value="">Brand</option>';
        if(!c) return document.getElementById('brandGroup').classList.add('hidden');
        const brands = [...new Set(rawData.filter(i => i.name === c).map(i => i.brand))];
        brands.forEach(b => {
            const stock = rawData.filter(i => i.name === c && i.brand === b).reduce((a, b) => a + b.stock, 0);
            bs.add(new Option(`${b} (${stock})`, b));
        });
        document.getElementById('brandGroup').classList.remove('hidden');
        if(pB) { bs.value = pB; filterModels(pM, pS, pC); }
    }

    function filterModels(pM, pS, pC) {
        const c = document.getElementById('catSelect').value, b = document.getElementById('brandSelect').value, ms = document.getElementById('modelSelect');
        ms.innerHTML = '<option value="">Model</option>';
        const mods = [...new Set(rawData.filter(i => i.name === c && i.brand === b).map(i => i.model))].filter(x => x);
        if(mods.length === 0) { document.getElementById('modelGroup').classList.add('hidden'); filterSizes(pS, pC); }
        else { 
            mods.forEach(m => {
                const stock = rawData.filter(i => i.name === c && i.brand === b && i.model === m).reduce((a, b) => a + b.stock, 0);
                ms.add(new Option(`${m} (${stock})`, m));
            }); 
            document.getElementById('modelGroup').classList.remove('hidden');
            if(pM) { ms.value = pM; filterSizes(pS, pC); }
        }
    }

    function filterSizes(pS, pC) {
        const c = document.getElementById('catSelect').value, b = document.getElementById('brandSelect').value, m = document.getElementById('modelSelect').value;
        const ss = document.getElementById('sizeSelect');
        ss.innerHTML = '<option value="">Size</option>';
        const filtered = rawData.filter(i => i.name === c && i.brand === b && (m ? i.model === m : true));
        const sizes = [...new Set(filtered.map(i => i.size))].filter(x => x);
        if(sizes.length === 0) { document.getElementById('sizeGroup').style.display='none'; filterColors(pC); }
        else { 
            sizes.forEach(s => {
                const sStock = filtered.filter(i => i.size === s).reduce((a, b) => a + b.stock, 0);
                ss.add(new Option(`${s} (${sStock})`, s));
            }); 
            document.getElementById('sizeGroup').style.display='block';
            if(pS) { ss.value = pS; filterColors(pC); }
        }
    }

    function filterColors(pC) {
        const c = document.getElementById('catSelect').value, b = document.getElementById('brandSelect').value, m = document.getElementById('modelSelect').value, s = document.getElementById('sizeSelect').value;
        const cs = document.getElementById('colorSelect');
        cs.innerHTML = '<option value="">Color</option>';
        const filtered = rawData.filter(i => i.name === c && i.brand === b && (m ? i.model === m : true) && (s ? i.size === s : true));
        const cols = [...new Set(filtered.map(i => i.color))].filter(x => x);
        if(cols.length === 0) { document.getElementById('colorGroup').style.display='none'; loadProduct(); }
        else { 
            cols.forEach(col => {
                const cStock = filtered.filter(i => i.color === col).reduce((a, b) => a + b.stock, 0);
                cs.add(new Option(`${col} (${cStock})`, col));
            }); 
            document.getElementById('colorGroup').style.display='block';
            if(pC) { cs.value = pC; loadProduct(); }
        }
    }

    function loadProduct() {
        const c = document.getElementById('catSelect').value, b = document.getElementById('brandSelect').value, m = document.getElementById('modelSelect').value, s = document.getElementById('sizeSelect').value, col = document.getElementById('colorSelect').value;
        selectedItem = rawData.find(i => i.name === c && i.brand === b && (m ? i.model === m : true) && (s ? i.size === s : true) && (col ? i.color === col : true));
        if(selectedItem) {
            document.getElementById('dashPanel').classList.remove('hidden');
            document.getElementById('resDealer').innerText = 'Dealer Cost: ₹' + selectedItem.dealerCost;
            document.getElementById('resStockTag').innerText = selectedItem.stock + ' IN STOCK';
            document.getElementById('salePrice').value = selectedItem.basePrice;
            const img = document.getElementById('prodImage'); img.classList.remove('loaded');
            img.src = selectedItem.photo || "https://i.ibb.co/3nTMhbz/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png";
            img.onload = () => img.classList.add('loaded');
        }
    }

    function addToCart() {
        const sp = parseFloat(document.getElementById('salePrice').value), q = parseInt(document.getElementById('qty').value);
        if(!selectedItem || q < 1 || q > selectedItem.stock) return alert("Error in stock/qty");
        cart.push({ ...selectedItem, qty: q, price: sp, originalMRP: selectedItem.basePrice });
        document.getElementById('targetTotal').value = '';
        renderReceipt();
        document.getElementById('dashPanel').classList.add('hidden');
        document.getElementById('idSearch').value = '';
    }

    function applyTargetRounding() {
        const target = parseFloat(document.getElementById('targetTotal').value);
        if (!target || target <= 0) { cart.forEach(item => item.price = item.originalMRP); renderReceipt(); return; }
        const currentSumMRP = cart.reduce((sum, item) => sum + (item.originalMRP * item.qty), 0);
        const multiplier = target / currentSumMRP;
        cart.forEach(item => { item.price = Math.round(item.originalMRP * multiplier); });
        renderReceipt();
    }

    function renderReceipt() {
        const receipt = document.getElementById('receiptContent'), section = document.getElementById('receiptSection');
        grandTotal = 0;
        receipt.innerHTML = `<div class="text-[10px] font-black text-gray-500 uppercase tracking-widest text-center border-b border-black/5 dark:border-white/5 pb-3">Cart Summary</div>`;
        cart.forEach((item, i) => {
            const lineTotal = item.price * item.qty;
            const disc = item.originalMRP > 0 ? Math.round(((item.originalMRP - item.price) / item.originalMRP) * 100) : 0;
            grandTotal += lineTotal;
            receipt.innerHTML += `
                <div class="flex justify-between items-start py-4 border-b border-black/5 dark:border-white/5">
                    <div>
                        <p class="font-bold text-sm">${item.name}</p>
                        <p class="text-[10px] text-gray-500">${item.size} • ₹${item.originalMRP}</p>
                        ${disc > 0 ? `<span class="receipt-discount-tag mt-2 inline-block">${disc}% OFF</span>` : ''}
                        <div class="flex items-center gap-3 mt-3">
                            <div class="qty-btn" onclick="updateQty(${i}, -1)">-</div>
                            <span class="text-sm font-bold">${item.qty}</span>
                            <div class="qty-btn" onclick="updateQty(${i}, 1)">+</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-900 text-lg">₹${lineTotal.toLocaleString()}</p>
                        <p onclick="removeItem(${i})" class="text-[9px] font-black text-rose uppercase mt-2">Remove</p>
                    </div>
                </div>`;
        });
        receipt.innerHTML += `
            <div class="flex justify-between items-center pt-4">
                <span class="text-[10px] font-black text-accent uppercase">Payable</span>
                <span class="text-3xl font-900">₹${grandTotal.toLocaleString()}</span>
            </div>`;
        section.classList.toggle('hidden', cart.length === 0);
    }

    function updateQty(i, change) {
        const item = cart[i], master = rawData.find(m => m.code === item.code);
        if (item.qty + change > master.stock) return alert("Stock Limit!");
        if (item.qty + change > 0) { item.qty += change; renderReceipt(); } else { removeItem(i); }
    }

    function removeItem(i) { cart.splice(i, 1); renderReceipt(); }
    function handleCheckoutFlow() {
        if(cart.length === 0) return alert("Empty basket");
        if(document.getElementById('payMode').value === "UPI") {
            document.getElementById('modalTotal').innerText = "₹" + grandTotal.toLocaleString();
            document.getElementById('paymentModal').style.display = "flex";
        } else { submitSale(); }
    }
    function closeModal() { document.getElementById('paymentModal').style.display = "none"; }

    async function submitSale() {
        const btn = document.getElementById('finishBtn'); btn.disabled = true; btn.innerText = "Syncing..."; closeModal();
        const payload = { cart: cart, mode: document.getElementById('payMode').value, customer: document.getElementById('custName').value || "Guest", receivedBy: document.getElementById('receivedBy').value || "N/A" };
        await fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) });
        localStorage.removeItem('sportsHubCache'); alert("Success!"); location.reload();
    }
</script>
</body>
</html>
