<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Hub Pro | Cart</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --surface: #0f1218; --accent: #38bdf8; --text: #f8fafc; --dim: #64748b; --border: rgba(255,255,255,0.06); --neon-green: #4ade80; --neon-red: #f43f5e; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border); border-radius: 32px; padding: 24px; box-shadow: 0 40px 80px rgba(0,0,0,0.8); }
        .header { text-align: center; margin-bottom: 20px; }
        .header img { width: 80px; filter: drop-shadow(0 0 10px var(--accent)); }
        
        .field-label { display: block; font-size: 10px; font-weight: 800; color: var(--dim); text-transform: uppercase; margin: 0 0 8px 4px; letter-spacing: 1px; }
        .input-wrapper { margin-bottom: 15px; }
        select, input { width: 100%; padding: 14px; background: #171b24; border: 1px solid var(--border); border-radius: 14px; color: white; outline: none; box-sizing: border-box; }
        
        /* Dashboard & Cart */
        .dash-panel { background: rgba(2, 6, 23, 0.4); border-radius: 18px; padding: 15px; border: 1px solid var(--border); margin-bottom: 15px; display: none; }
        .cart-section { background: rgba(255,255,255,0.02); border-radius: 20px; padding: 15px; border: 1px dashed var(--border); margin: 20px 0; display: none; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
        .remove-btn { color: var(--neon-red); cursor: pointer; font-weight: 800; padding: 5px; }

        .btn-add { width: 100%; padding: 15px; background: transparent; border: 2px solid var(--accent); color: var(--accent); border-radius: 14px; font-weight: 800; cursor: pointer; margin-bottom: 10px; }
        .btn-finish { width: 100%; padding: 20px; background: white; color: black; border: none; border-radius: 16px; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .total-card { background: linear-gradient(135deg, #0ea5e9, #2563eb); padding: 20px; border-radius: 22px; text-align: center; margin-top: 10px; }

        #upiModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <img src="https://i.ibb.co/3nTMhbz/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png">
        <h2 style="margin:10px 0 0; font-size:18px; letter-spacing:2px;">SPORTS HUB</h2>
    </div>

    <div class="input-wrapper"><input type="text" id="idSearch" placeholder="Search Product ID..." oninput="handleSearch()"></div>
    <div class="input-wrapper"><select id="catSelect" onchange="filterBrands()"><option value="">Loading...</option></select></div>
    <div id="brandGroup" class="input-wrapper" style="display:none;"><select id="brandSelect" onchange="filterModels()"></select></div>
    <div id="modelGroup" class="input-wrapper" style="display:none;"><select id="modelSelect" onchange="filterSizes()"></select></div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div id="sizeGroup" class="input-wrapper" style="display:none;"><select id="sizeSelect" onchange="filterColors()"></select></div>
        <div id="colorGroup" class="input-wrapper" style="display:none;"><select id="colorSelect" onchange="loadProduct()"></select></div>
    </div>

    <div id="dashPanel" class="dash-panel">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <div id="resStockTag" style="font-size:12px; font-weight:800;"></div>
            <div id="resDealer" style="color:var(--accent); font-weight:700;"></div>
        </div>
        <div style="display:grid; grid-template-columns: 1.5fr 1fr; gap:10px;">
            <input type="number" id="salePrice" placeholder="Price">
            <input type="number" id="qty" value="1" placeholder="Qty">
        </div>
        <button class="btn-add" onclick="addToCart()">+ ADD TO CART</button>
    </div>

    <div id="cartSection" class="cart-section">
        <label class="field-label">Items in Cart</label>
        <div id="cartList"></div>
    </div>

    <div class="input-wrapper">
        <div style="display:flex; gap:10px;">
            <select id="payMode" onchange="toggleReceivedBy()" style="width:100px;"><option value="UPI">UPI</option><option value="Cash">Cash</option></select>
            <input type="text" id="custName" placeholder="Customer Name">
        </div>
    </div>
    <div id="receivedGroup" class="input-wrapper" style="display:none;"><input type="text" id="receivedBy" placeholder="Staff Name"></div>

    <div class="total-card"><span>Payable Total</span><h2 id="finalTotal" style="margin:5px 0 0; font-size:32px;">₹0</h2></div>
    <button onclick="handleFinish()" class="btn-finish" id="finishBtn">Finish Transaction</button>
</div>

<div id="upiModal">
    <h2 id="upiAmtDisplay" style="color:white; font-size:48px; margin-bottom:20px;"></h2>
    <img src="https://i.ibb.co/zV8dWkRg/Whats-App-Image-2026-04-09-at-2-44-08-PM.jpg" style="width:280px; border-radius:20px;">
    <button onclick="submitSale()" class="btn-finish" style="background:var(--neon-green); width:280px; margin-top:20px;">Confirm Paid</button>
    <button onclick="closeModal()" style="color:white; background:none; border:none; margin-top:20px;">Cancel</button>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxFYSwJAnR_KRFuH4tjSwCT1LO5zg-hFYyfmG88zEesDVP7kxM_kUQoLAEeF7MdiTYHHg/exec';
    let rawData = [], cart = [], selectedItem = null;

    window.onload = () => {
        fetch(scriptURL).then(r => r.json()).then(data => {
            rawData = data.map(i => ({...i, stock: Number(i.stock || 0), dealerCost: Number(i.dealerCost || 0)}));
            const cats = [...new Set(rawData.map(i => i.name))];
            const sel = document.getElementById('catSelect');
            sel.innerHTML = '<option value="">Select Category</option>';
            cats.forEach(c => {
                const total = rawData.filter(i => i.name === c).reduce((a, b) => a + b.stock, 0);
                sel.add(new Option(`${c} (${total})`, c));
            });
        });
    };

    function handleSearch() {
        const code = document.getElementById('idSearch').value.toUpperCase();
        const found = rawData.find(i => i.code === code);
        if(found) {
            document.getElementById('catSelect').value = found.name;
            filterBrands(found.brand); filterModels(found.model); filterSizes(found.size); filterColors(found.color);
        }
    }

    function filterBrands(pre) {
        const c = document.getElementById('catSelect').value;
        const bs = document.getElementById('brandSelect');
        bs.innerHTML = '<option value="">Brand</option>';
        if(!c) return document.getElementById('brandGroup').style.display='none';
        const brands = [...new Set(rawData.filter(i => i.name === c).map(i => i.brand))];
        brands.forEach(b => {
            const bStock = rawData.filter(i => i.name === c && i.brand === b).reduce((a, b) => a + b.stock, 0);
            bs.add(new Option(`${b} (${bStock})`, b));
        });
        document.getElementById('brandGroup').style.display='block';
        if(pre) { bs.value = pre; filterModels(); }
    }

    function filterModels() {
        const c = document.getElementById('catSelect').value, b = document.getElementById('brandSelect').value;
        const ms = document.getElementById('modelSelect');
        ms.innerHTML = '<option value="">Model</option>';
        const mods = [...new Set(rawData.filter(i => i.name === c && i.brand === b).map(i => i.model))].filter(x => x);
        if(mods.length === 0) { document.getElementById('modelGroup').style.display='none'; filterSizes(); }
        else { mods.forEach(m => ms.add(new Option(m, m))); document.getElementById('modelGroup').style.display='block'; }
    }

    function filterSizes() {
        const c = document.getElementById('catSelect').value, b = document.getElementById('brandSelect').value, m = document.getElementById('modelSelect').value;
        const ss = document.getElementById('sizeSelect');
        ss.innerHTML = '<option value="">Size</option>';
        const sizes = [...new Set(rawData.filter(i => i.name === c && i.brand === b && (m ? i.model === m : true)).map(i => i.size))].filter(x => x);
        if(sizes.length === 0) { document.getElementById('sizeGroup').style.display='none'; filterColors(); }
        else { sizes.forEach(s => ss.add(new Option(s, s))); document.getElementById('sizeGroup').style.display='block'; }
    }

    function filterColors() {
        const c = document.getElementById('catSelect').value, b = document.getElementById('brandSelect').value, m = document.getElementById('modelSelect').value, s = document.getElementById('sizeSelect').value;
        const cs = document.getElementById('colorSelect');
        cs.innerHTML = '<option value="">Color</option>';
        const cols = [...new Set(rawData.filter(i => i.name === c && i.brand === b && (m ? i.model === m : true) && (s ? i.size === s : true)).map(i => i.color))].filter(x => x);
        if(cols.length === 0) { document.getElementById('colorGroup').style.display='none'; loadProduct(); }
        else { cols.forEach(col => cs.add(new Option(col, col))); document.getElementById('colorGroup').style.display='block'; }
    }

    function loadProduct() {
        const c = document.getElementById('catSelect').value, b = document.getElementById('brandSelect').value, m = document.getElementById('modelSelect').value, s = document.getElementById('sizeSelect').value, col = document.getElementById('colorSelect').value;
        selectedItem = rawData.find(i => i.name === c && i.brand === b && (m ? i.model === m : true) && (s ? i.size === s : true) && (col ? i.color === col : true));
        if(selectedItem) {
            document.getElementById('dashPanel').style.display = 'block';
            document.getElementById('resDealer').innerText = 'Dealer: ₹' + selectedItem.dealerCost.toFixed(2);
            document.getElementById('resStockTag').innerText = selectedItem.stock + ' IN STOCK';
            document.getElementById('resStockTag').style.color = selectedItem.stock <= 1 ? '#f43f5e' : '#4ade80';
            document.getElementById('salePrice').value = selectedItem.basePrice;
        }
    }

    function addToCart() {
        const price = parseFloat(document.getElementById('salePrice').value), qty = parseInt(document.getElementById('qty').value);
        if(!selectedItem || qty < 1 || qty > selectedItem.stock) return alert("Check selection/stock");
        
        cart.push({ code: selectedItem.code, name: selectedItem.name, color: selectedItem.color, qty: qty, price: price });
        renderCart();
        document.getElementById('dashPanel').style.display = 'none';
        document.getElementById('idSearch').value = '';
    }

    function renderCart() {
        const list = document.getElementById('cartList');
        list.innerHTML = '';
        let total = 0;
        cart.forEach((item, i) => {
            total += (item.price * item.qty);
            const div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML = `<div><strong>${item.name}</strong><br><small>${item.qty} x ₹${item.price}</small></div><span class="remove-btn" onclick="removeItem(${i})">×</span>`;
            list.appendChild(div);
        });
        document.getElementById('finalTotal').innerText = '₹' + total.toLocaleString('en-IN');
        document.getElementById('cartSection').style.display = cart.length > 0 ? 'block' : 'none';
    }

    function removeItem(i) { cart.splice(i, 1); renderCart(); }
    function toggleReceivedBy() { document.getElementById('receivedGroup').style.display = (document.getElementById('payMode').value === 'Cash' ? 'block' : 'none'); }
    
    function handleFinish() {
        if(cart.length === 0) return alert("Cart empty");
        if(document.getElementById('payMode').value === 'UPI') {
            document.getElementById('upiAmtDisplay').innerText = document.getElementById('finalTotal').innerText;
            document.getElementById('upiModal').style.display = 'flex';
        } else submitSale();
    }

    function closeModal() { document.getElementById('upiModal').style.display = 'none'; }

    async function submitSale() {
        const btn = document.getElementById('finishBtn');
        btn.disabled = true; btn.innerText = "Syncing...";
        const payload = { cart: cart, mode: document.getElementById('payMode').value, customer: document.getElementById('custName').value || "Guest", receivedBy: document.getElementById('receivedBy').value || "N/A" };
        await fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) });
        alert("Success!"); location.reload();
    }
</script>
</body>
</html>
